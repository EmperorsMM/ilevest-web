# Supabase CLI config for LOCAL development only.
# Real per-environment project refs are supplied via CI/Vercel secrets, never committed here.
project_id = "ilevest-local"

[api]
enabled = true
port = 54321
schemas = ["public"]
extra_search_path = ["public"]
max_rows = 1000

[db]
port = 54322
# Match this to your Supabase projects' Postgres version.
major_version = 15

[studio]
enabled = true
port = 54323

[auth]
enabled = true
site_url = "http://localhost:3000"

[functions.verify-certificate]
   verify_jwt = false
   [functions.paystack-webhook]
   verify_jwt = false
