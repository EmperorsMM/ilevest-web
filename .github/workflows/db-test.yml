# Ilevest — Database (Stage 1) test
# Spins up a throwaway PostgreSQL, applies every migration in order, then runs the
# behavioural smoke test (FSM, RLS, append-only, money ledger, hash-chain). A green check
# on your commit means the database foundation still holds; a red X means something broke.
# Runs automatically on pushes/PRs that touch the DB, and can be run by hand from the
# "Actions" tab (the "Run workflow" button) via workflow_dispatch.

name: Database (Stage 1) test

on:
  push:
    paths:
      - 'supabase/migrations/**'
      - 'supabase/tests/**'
      - '.github/workflows/db-test.yml'
  pull_request:
    paths:
      - 'supabase/migrations/**'
      - 'supabase/tests/**'
  workflow_dispatch: {}

jobs:
  migrations-and-rls:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: ilevest_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      PGHOST: localhost
      PGPORT: "5432"
      PGUSER: postgres
      PGPASSWORD: postgres
      PGDATABASE: ilevest_test

    steps:
      - name: Check out the repository
        uses: actions/checkout@v4

      - name: Install the psql client
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq postgresql-client

      - name: Apply all migrations in order
        run: |
          set -e
          for f in $(ls supabase/migrations/*.sql | sort); do
            echo "applying $(basename "$f")"
            psql -v ON_ERROR_STOP=1 -q -f "$f"
          done
          echo "all migrations applied"

      - name: Run the Stage 1 smoke test (must pass every assertion)
        run: |
          psql -v ON_ERROR_STOP=1 -q -f supabase/tests/stage1_smoke.sql
          echo "smoke test exit code: $?  (0 = all assertions passed)"
