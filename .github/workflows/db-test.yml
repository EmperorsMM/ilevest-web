# Ilevest — Database + functions tests
# Spins up a throwaway PostgreSQL and, for EACH stage, builds a fresh database, applies every
# migration in order, then runs that stage's behavioural smoke test. Isolating each suite in its
# own database keeps them order-independent (the suites intentionally reuse seed ids). Coverage:
# Stage 1 (schema, RLS, append-only money + verdict, the proof-layer hash-chain), Stage 2 (fan-out
# + idempotency, Ops-direct assignment, evidence least-privilege, sealing, public verification),
# Stage 3 (RFC 6962 Merkle root, daily anchoring, write-once batch link + proof, certificate honesty,
# no-PII), Increment 1 — the Fulfilment Desk (ratified FSM matrix, the three ceremony doors,
# void markers + sealed-evidence manifest, findings discipline, self-seal guard, retry-first
# escalation, canonical-recipe stability). A second job runs the Paystack webhook signature unit test under Node. Runs on
# pushes/PRs touching the DB or functions, and on demand from the Actions tab.

name: Database + functions tests

on:
  push:
    paths:
      - 'supabase/migrations/**'
      - 'supabase/tests/**'
      - 'supabase/functions/**'
      - '.github/workflows/db-test.yml'
  pull_request:
    paths:
      - 'supabase/migrations/**'
      - 'supabase/tests/**'
      - 'supabase/functions/**'
  workflow_dispatch: {}

jobs:
  database:
    name: migrations + behavioural smoke tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: ilevest_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      PGHOST: localhost
      PGPORT: "5432"
      PGUSER: postgres
      PGPASSWORD: postgres
      PGDATABASE: ilevest_test
    steps:
      - name: Check out the repository
        uses: actions/checkout@v4

      - name: Install the psql client
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq postgresql-client

      - name: Build a fresh, fully-migrated database for each stage
        run: |
          set -e
          for db in ilv_s1 ilv_s2 ilv_s3 ilv_s4 ilv_s5; do
            createdb "$db"
            for f in $(ls supabase/migrations/*.sql | sort); do
              psql -d "$db" -v ON_ERROR_STOP=1 -q -f "$f"
            done
            echo "migrated $db"
          done

      - name: Stage 1 smoke test (schema, RLS, immutability, money, hash-chain)
        run: psql -d ilv_s1 -v ON_ERROR_STOP=1 -q -f supabase/tests/stage1_smoke.sql

      - name: Stage 2 smoke test (fan-out, assignment, evidence, sealing, verification)
        run: psql -d ilv_s2 -v ON_ERROR_STOP=1 -q -f supabase/tests/stage2_smoke.sql

      - name: Stage 3 smoke test (Merkle root, daily anchoring, proof attach, certificate honesty)
        run: psql -d ilv_s3 -v ON_ERROR_STOP=1 -q -f supabase/tests/stage3_smoke.sql

      - name: Stage 4 smoke test (Client Portal read-model: quote, buyer status, ownership)
        run: psql -d ilv_s4 -v ON_ERROR_STOP=1 -q -f supabase/tests/stage4_smoke.sql

      - name: Client dashboard test (my_orders ownership + status/verdict summary)
        run: psql -d ilv_s4 -v ON_ERROR_STOP=1 -q -f supabase/tests/my_orders_smoke.sql

      - name: Order creation test (create_order: bundle expansion, custom de-dup, ownership, validation)
        run: psql -d ilv_s4 -v ON_ERROR_STOP=1 -q -f supabase/tests/create_order_smoke.sql

      - name: Order detail test (state_code + optional seller; order_tracking exposes check_id/property/seller)
        run: psql -d ilv_s4 -v ON_ERROR_STOP=1 -q -f supabase/tests/order_detail_smoke.sql

      - name: Notifications test (outbox enqueue, order_received + verdict_ready hooks, RLS)
        run: psql -d ilv_s4 -v ON_ERROR_STOP=1 -q -f supabase/tests/notifications_smoke.sql

      - name: Invoice engine test (per-line VAT, totals, receipt, gating, issue->email+payment, fan-out)
        run: psql -d ilv_s4 -v ON_ERROR_STOP=1 -q -f supabase/tests/invoice_engine_smoke.sql

      - name: Fulfilment Desk test (Increment 1: FSM matrix, ceremony doors, voids + manifest, self-seal, retry-first, recipe stability)
        run: psql -d ilv_s5 -v ON_ERROR_STOP=1 -q -f supabase/tests/fulfilment_desk_smoke.sql

  functions:
    name: Edge Function unit tests
    runs-on: ubuntu-latest
    steps:
      - name: Check out the repository
        uses: actions/checkout@v4

      - name: Set up Node 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Paystack webhook signature verification test
        run: node --experimental-strip-types supabase/functions/_shared/paystack.test.ts

      - name: Notifications render + dispatch test
        run: node --experimental-strip-types supabase/functions/_shared/notifications.test.ts

      - name: Anchor orchestration test
        run: node --experimental-strip-types supabase/functions/_shared/anchor.test.ts
